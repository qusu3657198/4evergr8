<html lang="zh">
<head>

    <link href="/4evergr8/resources/style.css" rel="stylesheet"></link>
    <link href="/4evergr8/resources/icon.png" rel="icon" type="image/png"></link>
    <meta content="/4evergr8/resources/icon.png" name="apple-touch-icon"></meta>
    <meta charset="UTF-8"></meta>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"></meta>
    <title>反向图片搜索</title>
</head>
<body>


<div class="card">
    <h1>反向图片搜索</h1>

    <label>自建图床链接：</label>
    <input id="workerUrlInput" type="text" value="https://image-6eu.pages.dev"/>

    <!-- 上传 + 剪贴板 并排 -->
    <div>
        <input accept="image/*" id="fileInput" onchange="uploadImage(this)" type="file"/>
        <button onclick="handleClipboard()">剪贴板</button>
    </div>

    <div id="buttonsContainer"
         style="align-items: center; display: flex; flex-direction: column; gap: 10px; margin-top: 20px;"></div>
    <button onclick="location.href='/index.html'">回到主页</button>

</div>

<script>
    function generateButtons() {
        const url = document.getElementById("imageUrlInput")?.value?.trim();
        const container = document.getElementById("buttonsContainer");
        container.innerHTML = "";

        if (!url) return;

        const engines = [
            ["Google Lens", `https://lens.google.com/uploadbyurl?url=${url}`],
            ["Yandex.ru", `https://yandex.ru/images/search?url=${url}&rpt=imageview`],
            ["SauceNAO", `https://saucenao.com/search.php?url=${url}`],
            ["Lenso.ai", `https://lenso.ai/en/search-by-url?url=${url}&utm_source=sbi`],
            ["TinEye", `https://tineye.com/search/?url=${url}`],
            ["Google", `https://www.google.com/searchbyimage?client=app&image_url=${url}`],
            ["3DIQDB", `https://3d.iqdb.org/?url=${url}`],
            ["IQDB", `https://iqdb.org/?url=${url}`],
            ["ascii2d", `https://ascii2d.net/search/url/${url}`],
            ["WAIT", `https://trace.moe/?url=${url}`],
            ["Trace.moe", `https://trace.moe/?url=${url}`]
        ];

        for (const [name, link] of engines) {
            const button = document.createElement("button");
            button.textContent = name;
            button.onclick = () => window.open(link, "_blank");
            container.appendChild(button);
        }
    }

    async function uploadImage(fileInputOrFile) {
        let file;

        if (fileInputOrFile?.files) {
            file = fileInputOrFile.files[0];
        } else {
            file = fileInputOrFile;
        }

        if (!file) return;

        const workerUrl = document.getElementById("workerUrlInput").value.trim();
        if (!workerUrl) {
            alert("请输入图床链接");
            return;
        }

        const randomKey = generateRandomKey();
        const MAX_TS = 9999999999999;

        let timestamp = MAX_TS - Date.now();

        const key = `${String(timestamp).padStart(13, '0')}${randomKey}-WEB`;
        const uploadUrl = `${workerUrl}/upload/${key}`;

        const formData = new FormData();
        formData.append("file", file, file.name);

        try {
            const response = await fetch(uploadUrl, {
                method: "POST",
                body: formData
            });

            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`上传失败: ${response.status} ${errText}`);
            }

            const imageUrl = `${workerUrl}/download/${key}`;
            setImageUrl(imageUrl);
            generateButtons();
        } catch (err) {
            alert("图片上传失败: " + err.message);
        }
    }

    function setImageUrl(url) {
        if (!document.getElementById("imageUrlInput")) {
            const hidden = document.createElement("input");
            hidden.type = "hidden";
            hidden.id = "imageUrlInput";
            document.body.appendChild(hidden);
        }
        document.getElementById("imageUrlInput").value = url;
    }

    function generateRandomKey() {
        const chars = 'abcdefghijklmnopqrstuvwxyz';
        let result = '';
        for (let i = 0; i < 5; i++) {
            result += chars[Math.floor(Math.random() * chars.length)];
        }
        return result;
    }

    async function handleClipboard() {
        try {
            const items = await navigator.clipboard.read();

            for (const item of items) {
                for (const type of item.types) {
                    if (type.startsWith("image/")) {
                        const blob = await item.getType(type);
                        const file = new File([blob], "clipboard.png", {type: blob.type});
                        await uploadImage(file);
                        return;
                    }
                }
            }

            const text = await navigator.clipboard.readText();
            if (text) {
                setImageUrl(text.trim());
                generateButtons();
                return;
            }

            alert("剪贴板为空");
        } catch (e) {
            alert("读取剪贴板失败");
        }
    }
</script>


</body>
</html>
