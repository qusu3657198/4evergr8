<!DOCTYPE html>
<html lang="zh">
<head>
    <link rel="stylesheet" href="/4evergr8/resources/style.css"/>
    <link rel="icon" href="/4evergr8/resources/icon.png" type="image/png">
    <link rel="shortcut icon" href="/4evergr8/resources/icon.png" type="image/png">
    <meta name="apple-touch-icon" content/4evergr8="/resources/icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>常用工具合集</title>
    <script>


        async function stunTest() {
            const configuration = {
                iceServers: [{urls: 'stun:stun.l.google.com:19302'}] // 使用 Google 的公共 STUN 服务器
            };

            const pc = new RTCPeerConnection(configuration);
            const ipAddresses = new Set();

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    const candidate = event.candidate.candidate;
                    const match = candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/);
                    if (match) {
                        ipAddresses.add(match[0]);
                    }
                }
            };

            // 创建数据通道以便触发 ICE 候选者事件
            pc.createDataChannel("test");

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            // 等待一段时间以收集 ICE 候选者
            setTimeout(() => {
                displayResults(ipAddresses);
                console.log(ipAddresses)
                pc.close(); // 关闭连接
            }, 1000);
        }

        function displayResults(ipAddresses) {
            const resultsDiv = document.getElementById('results');

            if (ipAddresses.size > 0) {
                ipAddresses.forEach(ip => {
                    document.getElementById('leakip').innerText = '真实IP: ' + ip;
                });
            } else {
                resultsDiv.innerText = '未检测到 IP 地址';
            }
        }


        window.addEventListener('load', async function () {
            getIp(); // 获取 IP 地址等信息
            await stunTest();

        });


    </script>
</head>
<body>


<div class="card">
    <h1>常用工具合集</h1>
    <label id="leakip">真实IP: 正在获取.</label>

    <button onclick="location.href='/4evergr8/p/OCR.html'">浏览器OCR</button>



</div>
</body>
</html>
